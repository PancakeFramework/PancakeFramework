# AI 模块配置
# 所有配置项都有默认值，只需配置 api_key 即可使用
# 环境变量用 ${VAR_NAME} 引用

ai:
  default_model: deepseek

  providers:
    deepseek:
      type: openai
      base_url: https://api.deepseek.com
      api_key: ${DEEPSEEK_API_KEY}
      model: deepseek-chat
      max_tokens: 4096
      temperature: 0.7
      timeout: 60
      retry: 3

    # 取消注释以启用其他模型
    # openai:
    #   type: openai
    #   base_url: https://api.openai.com/v1
    #   api_key: ${OPENAI_API_KEY}
    #   model: gpt-4o

    # gemini:
    #   type: google
    #   api_key: ${GOOGLE_API_KEY}
    #   model: gemini-2.0-flash

    # ollama:
    #   type: ollama
    #   base_url: http://localhost:11434
    #   model: llama3

  memory:
    short_term:
      backend: memory             # memory(内存) | redis | mybatis
      table_name: ai_short_term   # MyBatis 表名
      ttl: 86400                  # 过期时间（秒），0=永不过期
      max_messages: 20            # 滑动窗口：保留最近 N 条

    long_term:
      backend: memory             # memory(内存) | redis | mybatis
      table_name: ai_long_term    # MyBatis 表名
      ttl: 0                      # 永不过期

  rag:
    backend: pgvector             # pgvector | redis | mongodb
    table_name: ai_rag_docs       # 表名/集合名
    embedding_provider: deepseek
    embedding_model: text-embedding-3-small
    chunk_size: 500
    chunk_overlap: 50
    top_k: 5
    dimension: 1536
    # PostgreSQL
    # pg_url: ${DATABASE_URL}
    # Redis
    # redis_url: redis://localhost:6379
    # MongoDB
    # mongo_url: ${MONGO_URL}
    # mongo_db: pancake
