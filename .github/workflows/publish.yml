name: Publish to PyPI

on:
  push:
    branches: [master]
    paths:
      - 'pyproject.toml'
  workflow_dispatch:
    inputs:
      force_publish:
        description: '强制发布（忽略版本检查）'
        required: false
        default: 'false'
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: poetry install --with dev --no-interaction

      - name: Read metadata from pyproject.toml
        id: metadata
        run: |
          VERSION=$(poetry version --short)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Check if version tag exists
        id: check-tag
        run: |
          VERSION="${{ steps.metadata.outputs.version }}"
          FORCE="${{ inputs.force_publish || 'false' }}"
          if [ "$FORCE" = "true" ]; then
            echo "✅ 强制发布模式，跳过版本检查"
            echo "published=true" >> $GITHUB_OUTPUT
          elif git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "⚠️ 版本 v$VERSION 已存在，跳过发布"
            echo "published=false" >> $GITHUB_OUTPUT
          else
            echo "✅ 版本 v$VERSION 可以发布"
            echo "published=true" >> $GITHUB_OUTPUT
          fi

      - name: Build package
        if: steps.check-tag.outputs.published == 'true'
        run: poetry build

      - name: Publish to PyPI
        if: steps.check-tag.outputs.published == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create Git tag
        if: steps.check-tag.outputs.published == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.metadata.outputs.version }}" -m "Release v${{ steps.metadata.outputs.version }}"
          git push origin "v${{ steps.metadata.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check-tag.outputs.published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.metadata.outputs.version }}"
          name: "Pancake Framework v${{ steps.metadata.outputs.version }}"
          generate_release_notes: true
          body: |
            ## Pancake Framework v${{ steps.metadata.outputs.version }}

            🚀 **Decorator-driven Python web framework with IoC, MyBatis ORM, and AI workflow**

            ### Install

            ```bash
            pip install pancake_framework
            ```

            ### Features
            - Decorator-driven Python web framework with zero-import design
            - IoC Container (Singleton / Transient / Scoped)
            - Lifecycle Management
            - CLI tool: `pancake create/run/check/build`

            [Full Documentation](https://github.com/PancakeFramework/PancakeFramework#readme)
