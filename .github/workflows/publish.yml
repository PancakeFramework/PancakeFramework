name: Publish to PyPI

on:
  push:
    branches: [master]
    paths:
      - 'pyproject.toml'
      - 'pancake-*/pyproject.toml'

jobs:
  # Job 1: 发布主框架
  publish-main:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      published: ${{ steps.metadata.outputs.published }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: poetry install --with dev --no-interaction

      - name: Run tests
        run: poetry run pytest tests/ -v --tb=short

      - name: Read metadata from pyproject.toml
        id: metadata
        run: |
          VERSION=$(poetry version --short)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing main framework version: $VERSION"

      - name: Check if version tag exists
        id: check-tag
        run: |
          VERSION="${{ steps.metadata.outputs.version }}"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "⚠️ 版本 v$VERSION 已存在，跳过主框架发布"
            echo "published=false" >> $GITHUB_OUTPUT
          else
            echo "✅ 版本 v$VERSION 可以发布"
            echo "published=true" >> $GITHUB_OUTPUT
          fi

      - name: Build package
        if: steps.check-tag.outputs.published == 'true'
        run: poetry build

      - name: Publish to PyPI
        if: steps.check-tag.outputs.published == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create Git tag
        if: steps.check-tag.outputs.published == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.metadata.outputs.version }}" -m "Release v${{ steps.metadata.outputs.version }}"
          git push origin "v${{ steps.metadata.outputs.version }}"

  # Job 2: 发布插件包
  publish-plugins:
    needs: publish-main
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    outputs:
      plugins: ${{ steps.detect-plugins.outputs.plugins }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Detect plugin version changes
        id: detect-plugins
        run: |
          PLUGINS=""
          for plugin_dir in pancake-*/; do
            plugin_name=$(basename "$plugin_dir")
            if [ -f "$plugin_dir/pyproject.toml" ]; then
              # 读取插件版本
              VERSION=$(cd "$plugin_dir" && poetry version --short 2>/dev/null || echo "")
              if [ -n "$VERSION" ]; then
                # 检查版本 tag 是否存在
                TAG_NAME="${plugin_name}-v${VERSION}"
                if ! git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
                  echo "✅ $plugin_name 版本 $VERSION 需要发布"
                  PLUGINS="${PLUGINS}${plugin_name}:${VERSION},"
                else
                  echo "⏭️ $plugin_name 版本 $VERSION 已存在，跳过"
                fi
              fi
            else
              echo "⚠️ $plugin_name 缺少 pyproject.toml，跳过"
            fi
          done
          # 移除末尾逗号
          PLUGINS=${PLUGINS%,}
          echo "plugins=$PLUGINS" >> $GITHUB_OUTPUT
          echo "Detected plugins to publish: $PLUGINS"

      - name: Publish plugins
        if: steps.detect-plugins.outputs.plugins != ''
        run: |
          IFS=',' read -ra PLUGIN_LIST <<< "${{ steps.detect-plugins.outputs.plugins }}"
          for plugin_info in "${PLUGIN_LIST[@]}"; do
            IFS=':' read -r plugin_name version <<< "$plugin_info"
            echo "📦 Publishing $plugin_name version $version..."

            # 进入插件目录
            cd "$plugin_name"

            # 安装依赖并构建
            poetry install --no-interaction
            poetry build

            # 发布到 PyPI
            poetry publish --no-interaction

            # 创建 tag
            TAG_NAME="${plugin_name}-v${version}"
            cd ..
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG_NAME" -m "Release $plugin_name v$version"
            git push origin "$TAG_NAME"

            echo "✅ $plugin_name v$version 发布完成"
          done

  # Job 3: 创建 GitHub Release
  create-release:
    needs: [publish-main, publish-plugins]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.publish-main.outputs.version }}"
          name: "Pancake Framework v${{ needs.publish-main.outputs.version }}"
          generate_release_notes: true
          body: |
            ## Pancake Framework v${{ needs.publish-main.outputs.version }}

            🚀 **Decorator-driven Python web framework with IoC, MyBatis ORM, and AI workflow**

            ### Install

            **Standard Installation:**
            ```bash
            pip install pancake_framework
            ```

            **Install with all plugins:**
            ```bash
            pip install "pancake_framework[all]"
            ```

            ### Plugins Published
            ${{ needs.publish-plugins.outputs.plugins != '' && format('- {0}', join(needs.publish-plugins.outputs.plugins, '\n- ')) || 'No plugin updates in this release' }}

            ### Features
            - Decorator-driven Python web framework with zero-import design
            - IoC Container (Singleton / Transient / Scoped)
            - MyBatis Plus ORM: BaseMapper CRUD, chain queries, pagination, dynamic SQL
            - Web: all HTTP methods, auth, middleware, validation, transaction
            - AI Module: OpenAI / DeepSeek / Gemini / Ollama / GLM / Moonshot / Qwen
            - Short-term & Long-term memory, RAG
            - Redis Cache with anti-penetration/avalanche/breakdown protection
            - Message Queue: SimpleBroker / RedisBroker
            - Lifecycle Management, Remote Calls (HTTP/gRPC)
            - CUI (Click) and GUI (Flet/Flutter) support
            - CLI tool: `pancake create/run/check/build`

            [Full Documentation](https://github.com/Drayee/PancakeFramework#readme)
