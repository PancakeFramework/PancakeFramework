name: PR Check

on:
  pull_request:
    branches: [master, main, dev]
    types: [opened, synchronize, reopened]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check PR title format
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          PATTERN="^(feat|fix|refactor|docs|test|chore)(\\(.*\\))?: .+"
          if [[ ! "$TITLE" =~ $PATTERN ]]; then
            echo "❌ PR 标题不符合规范: '$TITLE'"
            echo "期望格式: <type>: <描述>"
            echo "类型: feat / fix / refactor / docs / test / chore"
            exit 1
          fi
          echo "✅ PR 标题格式正确: $TITLE"

      - name: Check no direct main branch merge from non-main
        if: github.base_ref == 'main'
        run: |
          echo "ℹ️ 合并到 main 分支，请确保已通过 dev 分支验证"

      - name: Run tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: poetry install --extras "all" --with dev --no-interaction

      - name: Run tests
        run: poetry run python -m pytest tests/ -v --tb=short
